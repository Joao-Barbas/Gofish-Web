<div class="topbar">
  <div>Olá, {{ firstName }}</div>
  <button type="button" (click)="onSignOut()">Sign out</button>
</div>

<div class="controls">
  <div class="coords" *ngIf="selected; else noSel">
    Selecionado: <strong>{{ selected.lat.toFixed(6) }}, {{ selected.lng.toFixed(6) }}</strong>
  </div>
  <ng-template #noSel>
    <div class="coords">Clica no mapa para escolher um ponto</div>
  </ng-template>

  <div class="form">
    <input
      type="text"
      [(ngModel)]="description"
      placeholder="Descrição"
    />

    <!-- enquanto não tiveres selects, usa números (enum) -->
    <input
      type="number"
      [(ngModel)]="speciesType"
      placeholder="SpeciesType (enum number)"
    />

    <input
      type="number"
      [(ngModel)]="hookSize"
      placeholder="HookSize"
    />

    <input
      type="number"
      [(ngModel)]="baitType"
      placeholder="BaitType (enum number)"
    />

    <button type="button" (click)="addPin()" [disabled]="!selected">
      Adicionar pin
    </button>
  </div>
</div>

<div id="map"></div>
