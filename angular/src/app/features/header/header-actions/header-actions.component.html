<!-- header-actions.component.html -->

<div class="header-actions d-flex align-items-center icon-white-muted position-relative">
  <!-- Search toggle -->
  <button class="gf-toggle-circle">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m21 21-4.34-4.34"/>
      <circle cx="11" cy="11" r="8"/>
    </svg>
  </button>
  <!-- User toggle -->
  <button class="gf-toggle-circle" (click)="toggleUserPopup()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  </button>
  <!-- Admin toggle -->
  @if (isAdmin) {
    <button class="gf-toggle-circle" (click)="toggleAdminPopup()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
      </svg>
    </button>
  }
  <!-- Overlays -->
  @if (isUserPopupOpen$ | async) { <app-popup-user class="position-overlay" animate.enter="on-enter" animate.leave="on-leave"></app-popup-user> }
  @if (isAdminPopupOpen$ | async) { <app-popup-admin class="position-overlay" animate.enter="on-enter" animate.leave="on-leave"></app-popup-admin> }
</div>
