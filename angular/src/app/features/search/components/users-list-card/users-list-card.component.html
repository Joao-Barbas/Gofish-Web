<!-- users-list-card.component.html -->

<div>
  <a [routerLink]="['/profile', user().id]">
    <img [src]="avatar.resolve(user().avatarUrl)" alt="Avatar">
    <div>
      @if (user().firstName !== '' || user().lastName !== ''){
        <p>{{ user().firstName + ' ' + user().lastName }}</p>
      }
      <small>@{{ user().userName }}</small>
    </div>
  </a>
</div>
