@if(postData(); as post) {


<div class="d-grid gap-3 gf-card-forum-post">

  <!-- Post Header -->

  <div class="top-of-post d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2 gf-generic-clickable-wrapper" [routerLink]="Path.PROFILE(post!.author!.id)" title="Go to user profile">

      <img [src]="this.avatarService.resolve(post.author!.avatarUrl)" class="rounded-circle gf-big-avatar">
      <gf-user-title class="post-author-name text-bold" [text]="post.author!.displayName" [rank]="post.author!.rank"></gf-user-title>
      <!-- <span >{{ post.author?.userName }}</span> -->
      <span class="post-date dark-text-muted">{{ post.createdAt | timeAgo }}</span>

    </div>
    <div class="d-flex gap-1 post-action-buttons">
      <!-- Google Maps -->
       <button class="gf-badge-post-view-button" (click)="openGoogleMaps()" title="Open location in Google Maps">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.1 6a2 2 0 0 1 3.8 0"/><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>
      </button>

      <!-- Delete Post Button -->
      @if (post!.author!.userName == this.userName || isAdmin) {
        <button class="gf-badge" (click)="deletePost()" title="Delete post" data-testid="forum-post-delete">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      }
      <!-- Report Post Button -->
      @if (post!.author!.userName != this.userName) {
        <button class="gf-badge" (click)="report()" title="Report post" data-testid="forum-post-report">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528"/></svg>
        </button>
      }

      <!-- Location Post Button -->
      <button class="gf-badge" (click)="goToPin()" title="View post location">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="5" y1="12" y2="12"/><line x1="19" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="5"/><line x1="12" x2="12" y1="19" y2="22"/><circle cx="12" cy="12" r="7"/></svg>
      </button>

    </div>
  </div>


  <!-- Post Content -->

  <div class="ps-5 post-content">

    <!-- Post Description -->
    <div class="post-description">
      <p class="mb-2 description" [class.expanded]="isExpanded">
        {{ post.ugc?.body }}
      </p>

      @if ((post.ugc?.body?.length ?? 0) > 120) {
      <button type="button" class="see-more" (click)="toggleExpand()" title="Toggle full post description">
        {{ isExpanded ? 'See less' : 'See more' }}
      </button>
      }
    </div>
    @if (post.kind === pinKind.CATCH) {
    <div class="post-image-wrapper">
      <img [src]="post.ugc?.imageUrl" class="post-image">
    </div>
    }

    <!-- bottom container -->
    <div class="bottom-container">
      <!--  Banner (Pin Type) -->
      <app-enum class="d-flex" [postData]=post></app-enum>

      <!-- Upvote / Downvote / Comment and Share -->
      <div class="d-flex gap-2">
        <div class="gf-badge-vote post-interact-wrapper">
          <button class="post-interact-btn" [class.active-up]="currentVote() === 1" [disabled]="isVoting()" (click)="vote(1)" title="Upvote" data-testid="forum-post-vote-up">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="post-icon icon-upvote"><path d="M13.971 4.285A2 2 0 0 1 17 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z"/><path d="M21 20V4"/></svg>
          </button>

          <span class="post-stats post-fishing-points" title="Fishing points" data-testid="forum-post-score">
            {{ score() }}
          </span>

          <button class="post-interact-btn" class="post-interact-btn" [class.active-down]="currentVote() === -1" [disabled]="isVoting()" (click)="vote(-1)" title="Downvote" data-testid="forum-post-vote-down">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="post-icon icon-downvote"><path d="M13.971 4.285A2 2 0 0 1 17 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z"/><path d="M21 20V4"/></svg>
          </button>
        </div>

        <!-- Comment button -->
        <button class="gf-badge-comment post-interact-wrapper post-interact-comment-wrapper" (click)="goToPost()"
          title="Comments" data-testid="forum-post-open-comments">

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-message-circle-icon lucide-message-circle comment-icon">
            <path
              d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719" />
          </svg>

          <span class="post-stats post-fishing-points">{{ post.stats?.commentCount }}</span>
        </button>

        <!-- Share button -->
        <button class="gf-badge-comment post-interact-wrapper post-interact-comment-wrapper" (click)="copyLink(post.id)" title="Share post link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
          <span class="post-stats post-fishing-points share">Share</span>
        </button>
      </div>
    </div>

  </div>

</div>
}
