<div class="d-flex align-items-center justify-content-between gf-card-group-create-search">

  <!-- Create Group -->

  <div class="d-flex align-items-center create-group-wrapper">

    <button class="gf-badge-create-group-btn" [routerLink]= "Path.FORUM_CREATE_GROUP">

      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-plus-icon lucide-plus">
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </svg>

    </button>

    <span class="create-group-text">Create group</span>
  </div>

  <!-- Search Group -->
  <div class="search-group-wrapper justify-content-end">
    <div class="d-flex align-items-center search-bar">

      <button class="gf-badge-search-group-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search search-icon">
          <path d="m21 21-4.34-4.34" />
          <circle cx="11" cy="11" r="8" />
        </svg>
      </button>

      <input type="text" class="search-input" id="" placeholder="Search for group">

    </div>
  </div>

</div>

<!-- Group Listing -->

<div class="d-flex flex-column group-list-wrapper">

  <!-- #Comp my-group-listing-card -->
  <div class="gf-card-group-listing d-flex">

    <!-- Group-image -->
    <div class="group-image">
      <img src="assets/images/placeholder_profile_pic.png" class="group-image">
    </div>

    <!-- Name and stats -->
    <div class="d-flex flex-column group-info-and-stats">

      <div class="group-name-stats d-flex align-items-center justify-content-between ">
        <span class="group-name">Group Name</span>
        <div class="d-flex stats-wrapper">

          <div class="gf-badge-text">
            <span>99 Members</span>
          </div>

          <div class="gf-badge-text">
            <span>99 Posts</span>
          </div>
        </div>
      </div>

      <!-- Description -->
      <p class="group-description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Mollitia sit quas reiciendis
        distinctio quaerat a ab maxime, alias ullam, libero dolore commodi ducimus harum eligendi quisquam ut deserunt
        facere. Aspernatur!</p>
    </div>

  </div>


</div>


<!-- show-more -->
<div class="show-more">
  <button class="show-more-text">Show more</button>
</div>

<!-- New group -->

<button class="d-flex justify-content-center new-group-btn-wrapper">
    <div class="new-group-elements d-flex flex-column align-items-center">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-plus-icon lucide-circle-plus new-group-create-icon"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>

      <span class="new-group-create-text" [routerLink]= "Path.FORUM_CREATE_GROUP">Create a new group</span>
    </div>
</button>
