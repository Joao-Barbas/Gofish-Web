<div class="post-page">

  <!-- Main Post (Highlight of the page) -->
  <div class="d-grid gf-card-forum-post">
    @if(post(); as post) {
    <app-forum-post [postData]="post"></app-forum-post>
    <!-- Comment Area -->
    <form [formGroup]="commentForm" (ngSubmit)="submitComment()">
      <div class="gf-card-comment-area d-flex align-items-center">
        <textarea class="comment-area" placeholder="Join the conversation" minlength="5" maxlength="100" name=""
          formControlName="body" id=""></textarea>
      </div>
      <app-async-button type="submit" labels="Publish" [state]="busyState.isBusy() ? 'busy' : 'idle'">
      </app-async-button>
    </form>
    <div class="comment-list-section">
      @if (!comments()) {
      <gf-loading-spinner></gf-loading-spinner>
      } @else if (comments()?.comments?.length == 0) {
      }@else {
      <app-post-comments [comments]="comments()?.comments!"></app-post-comments>
      }
    </div>

    }

  </div>


  <app-group-settings-popover></app-group-settings-popover>
