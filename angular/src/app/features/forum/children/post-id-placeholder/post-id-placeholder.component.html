<div class="post-page">

  <!-- Main Post -->
  <div class="d-grid gf-card-forum-post">

    @if (post(); as post) {

      <!-- Post -->
      <app-forum-post [postData]="post"></app-forum-post>

      <!-- Comment Form -->
      <form [formGroup]="commentForm" (ngSubmit)="submitComment()">

        <div class="gf-card-comment-area d-flex align-items-center">
          <textarea
            class="comment-area"
            placeholder="Join the conversation"
            minlength="5"
            maxlength="100"
            formControlName="body">
          </textarea>
        </div>

        <app-async-button
          type="submit"
          labels="Publish"
          [state]="busyState.isBusy() ? 'busy' : 'idle'">
        </app-async-button>

      </form>

      <!-- Comments -->
      <div class="comment-list-section">

        @if (!comments()) {
          <gf-loading-spinner></gf-loading-spinner>

        } @else if (comments()?.comments?.length === 0) {
          <!-- opcional: empty state -->

        } @else {

          <app-post-comments
            [comments]="comments()?.comments!">
          </app-post-comments>

          @if (hasMoreResults()) {
            <div class="show-more">
              <button
                type="button"
                class="show-more-text"
                (click)="showMore()">
                Show more
              </button>
            </div>
          }

        }

      </div>

    }

  </div>

</div>
