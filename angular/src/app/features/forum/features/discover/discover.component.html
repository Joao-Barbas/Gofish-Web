@if(allFeedPosts()) {
@for (post of allFeedPosts()?.pins; track post.id) {
<app-forum-post [postData]="post"></app-forum-post>
}

@if (hasMoreResults()) {
<div class="show-more" (click)="showMore()">
  <button class="show-more-text">Show more</button>
</div>
}@else {
  <div class="end-message">
    <p>Looks like you've cleared the pond! Even the fish are taking a nap.</p>
  </div>
}

} @else {
<gf-loading-spinner></gf-loading-spinner>
}
