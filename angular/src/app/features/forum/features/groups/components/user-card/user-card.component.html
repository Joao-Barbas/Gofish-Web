@if (member(); as member) {
<div class="d-flex align-items-center justify-content-between gf-card-user-card">

  <div class="d-flex align-items-center user-photo-username-wrapper clickable"
    [routerLink]="Path.PROFILE(member.userId)">
    <img [src]="this.avatarService.resolve(member.avatarUrl)" class="rounded-circle user-photo">
    <div class="d-flex flex-column user-name-handle-name-wrapper">
      <span class="user-name">{{member.userName}}</span>
      <span class="user-handle-name">@{{member.userName}}</span>
    </div>
  </div>

  @if (!isCurrentUser()) {
  <div class="gf-pos-relative">

    <button class="gf-badge-user-settings" (click)="onSettingsClick($event)">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1" />
        <circle cx="19" cy="12" r="1" />
        <circle cx="5" cy="12" r="1" />
      </svg>
    </button>

    @if (popoverService.isOpen(popoverKey())) {
      <gf-group-member-settings-popover
        [member]="member"
        (click)="$event.stopPropagation()">
      </gf-group-member-settings-popover>
    }
  </div>
  }

</div>
}
