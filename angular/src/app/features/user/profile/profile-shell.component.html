<!-- profile-shell.component.html -->

@if (userProfileData.isLoading()) {
  <gf-loading-spinner></gf-loading-spinner>
} @else if (userProfileData.error()) {
  <gf-loading-error-modal
    [error]="userProfileData.error()!"
    (negative)="router.navigate([Path.HOME]);"
    (positive)="window.location.reload();">
  </gf-loading-error-modal>
} @else if (userProfileData.hasValue()) {
  <router-outlet></router-outlet>
}
