<!-- friends.component.html -->

<h5 class="gf-font-bold">{{ `${ profileContext.profile().userName }'s friends` }}</h5>
@if (profileContext.viewerIsProfileOwner()) {
  <nav class="gf-flow-horizontal gf-justify-evenly gf-items-center gf-w-100">
  <a [routerLink]="'.'" [queryParams]="{ tab: 'friends' }" [class.active]="activeTabOrDefault() === 'friends'">
    Friends
  </a>
  <a [routerLink]="'.'" [queryParams]="{ tab: 'requests' }" [class.active]="activeTabOrDefault() === 'requests'">
    Requests
  </a>
  </nav>
}
@if (activeTabOrDefault() === 'requests' && profileContext.viewerIsProfileOwner()) {
  <app-requests-list></app-requests-list>
} @else {
  <app-friends-list></app-friends-list>
}
