<!-- friends.component.html -->

<app-flat-header></app-flat-header>
<div class="gf-container-lg gf-w-90 gf-mx-auto gf-pt-64 gf-flow-vertical gf-gap-16" style="background-color:black;">
  <h5 class="gf-font-bold">{{ 'Username\'s friends' }}</h5>
  <nav class="gf-flow-horizontal gf-justify-evenly gf-items-center gf-w-100">
    <a [routerLink]="'.'"
       [queryParams]="{ tab: 'friends' }"
       [class.active]="activeTab() === 'friends'">
      Friends
    </a>
    <a [routerLink]="'.'"
       [queryParams]="{ tab: 'requests' }"
       [class.active]="activeTab() === 'requests'">
      Requests
    </a>
  </nav>
  @switch (activeTab()) {
    @case ('friends') {
      <app-friends-list></app-friends-list>
    }
    @case ('requests') {
      <app-requests-list></app-requests-list>
    }
  }
</div>
<app-footer></app-footer>
