<!-- friends-list.component.html -->

@switch (loadingState.status()) {
@case('loading') {
  <div class="loading-container gf-flow-vertical gf-center-axes">
    <svg animate.enter="spinner-enter" xmlns="http://www.w3.org/2000/svg"
        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/>
      <path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/>
      <path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/>
      <path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/>
    </svg>
    <span>Loading...</span>
  </div>
}
@case('error') {
  <div class="failed-container gf-flow-vertical gf-center-axes">
    <span>{{ loadingState.error() }}</span>
    <button (click)="loadInitial()">Try Again</button>
  </div>
}
@case('success') {
  <div class="list">
    @for (f of friendsList(); track trackByCompositeKey(f)) {
      <app-friend-card
      [friendship]="f"
      [user]="getOtherUser(f)"
      [actions]="false"
    ></app-friend-card>
    }
  </div>
  @if (hasMore()) {
    <app-async-button
      type="button"
      labels="Load more"
      [state]="busyState.isBusy() ? 'busy' : 'idle'"
      (click)="loadMore()"
    ></app-async-button>
    <!--
    <gf-async-button
      [labels]="['Load more', 'Loading...']"
      [states]="[() => true, busyState.isBusy]"
      (click)="loadMore()"
    ><gf-async-button/>
    -->
  }
}}
