<!-- group-list-card.component.html -->

<a [routerLink]="['/forum/my-crews', group().id]">
  <img [src]="avatarService.resolve(group().avatarUrl)" alt="Avatar">
  <div>
    <div class="gf-flow-horizontal gf-items-center gf-justify-between">
      <p>{{ group().name }}</p>
      <div class="gf-flow-horizontal gf-gap-6">
        <div class="gf-center-axes gf-py-0 gf-px-16 gf-text-xs user-stat">{{ `${group().memberCount} Sailors` }}</div>
        <div class="gf-center-axes gf-py-0 gf-px-16 gf-text-xs user-stat">{{ `${group().pinCount} Pins` }}</div>
      </div>
    </div>
    <small class="gf-mt-6">{{ group().description }}</small>
  </div>
</a>
@if (actions()) {
  <div>
    <button (click)="accepted.emit(group())">Accept</button>
    <button (click)="declined.emit(group())">Decline</button>
  </div>
}
