<!-- signin-verify.component.html -->

<div class="fixed-map-image-background">
  <div class="container-align-items-center">
    <div class="auth-parent-container">
      <div class="vertical-flow gf-gap-20">
        <div class="vertical-flow align-center-center">
          <img src="assets/images/logo-white-256.png" width="96" height="96">
          <label class="logo-text">GOFISH</label>
        </div>
        <form class="form-auth-container vertical-flow gf-gap-8" [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="vertical-flow gf-gap-4">
            <p class="form-input-label" style="font-size: 0.875rem; color: var(--dark-text-muted); line-height: 1.4; margin: 0;">
              Enter the 6-digit code from your authenticator app to complete sign in.
            </p>
          </div>
          <div class="vertical-flow">
            <label class="form-input-label">Authenticator Code</label>
            <input
              type="text"
              class="form-input"
              formControlName="code"
              placeholder="Enter 6-digit code"
              maxlength="6"
              autocomplete="one-time-code">
          </div>
          <div class="vertical-flow margin-top-12 gf-gap-4">
            @if (errorText) {
              <div class="error-feedback">{{ errorText }}</div>
            }
            <button type="submit" class="form-submit-button" [disabled]="busyState.isBusy()">
              Verify
            </button>
            <div class="text-small-muted">
              <a [routerLink]="Path.SIGN_IN">Back to sign in</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
