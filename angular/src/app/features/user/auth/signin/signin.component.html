<div class="gf-background-map-fixed gf-center-axes d-flex">
  <div class="gf-card gf-flow-vertical gf-container-xs gf-gap-12 gf-w-90">

    <!-- Logo -->
    <div class="gf-flow-vertical gf-center-axes">
      <img class="gf-display-block" src="assets/images/logo-white-256.png" width="96" height="96">
      <label class="gf-text-logo">GOFISH</label>
    </div>

    <!-- Third-party action -->
    <div>
      <button type="button" class="thrid-party-button" title="Sign up with Google" (click)="signInWithGoogle()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

          <path d="M256 101.9c37.7 0 71.2 13 98 38.2l73.3-73.3C382.8 25.4 325.1 0 256 0 155.9 0 69.6 57.5 27.5 141.3l85.2 66.1c20.2-60.5 76.7-105.5 143.3-105.5" style="fill:#ea4335"/>
        </svg>
        <span>Continue with Google</span>
      </button>
    </div>

    <!-- Divider -->
    <div class="choice-divider gf-center-axes text-small-muted">
      <span class="gf-text-xs">OR</span>
    </div>

    <!-- Body -->
    <form id="signin-form" class="form gf-flow-vertical gf-gap-6" [formGroup]="signInForm" (ngSubmit)="onSubmit()">
      <div class="d-block">
        <small>E-mail / Username</small>
        <input type="text" class="gf-w-100" formControlName="emailOrUserName">
      </div>
      <div class="password-input-wrapper">
        <input id="password" [type]="showPwd ? 'text' : 'password'" class="gf-w-100" formControlName="password" placeholder="Enter a password at least 6 characters long">
        <button type="button" class="password-toggle" (click)="showPwd = !showPwd" [title]="showPwd ? 'Hide password' : 'Show password'">
          @if (showPwd) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
              <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
              <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
              <path d="m2 2 20 20"/>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </form>

    <!-- Submit area -->
    <div class="gf-flow-vertical gf-my-12 gf-gap-4">
      @if (getError(); as errorText) {
        <span class="gf-text-error">{{ errorText }}</span>
      }
      @if (route.snapshot.queryParamMap.get('error') === 'account-exists') {
        <p>An account with this email already exists. Please sign in with your password.</p>
      }
      <app-async-button
        type="submit"
        form="signin-form"
        labels="Sign In"
        [state]="busyState.isBusy() ? 'busy' : signInSuccess ? 'success' : 'idle'"/>
      <p class="signup-invite">
        Or <a [routerLink]="Path.SIGN_UP">sign up</a> instead.
      </p>
    </div>

    <!-- Other options -->
    <div style="text-align: center;">
      <a class="gf-center-axes gf-flow-horizontal gf-mx-12 gf-gap-4 d-inline-flex link" [routerLink]="Path.ABOUT_US">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><defs><mask id="question-mask"><circle cx="12" cy="12" r="10" fill="white"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="black" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M12 17h.01" stroke="black" stroke-width="2" stroke-linecap="round"/></mask></defs><circle cx="12" cy="12" r="10" fill="currentColor" mask="url(#question-mask)"/></svg>
        <span>About Us</span>
      </a>
      <a class="gf-center-axes gf-flow-horizontal gf-mx-12 gf-gap-4 d-inline-flex link" [routerLink]="Path.TERMS">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m19 8 3 8a5 5 0 0 1-6 0zV7" fill="currentColor"/><path d="M3 7h1a17 17 0 0 0 8-2 17 17 0 0 0 8 2h1"/><path d="m5 8 3 8a5 5 0 0 1-6 0zV7" fill="currentColor"/><path d="M7 21h10"/></svg>
        <span>Terms</span>
      </a>
      <a class="gf-center-axes gf-flow-horizontal gf-mx-12 gf-gap-4 d-inline-flex link" [routerLink]="Path.PRIVACY">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" fill="none" stroke="none" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2" fill="currentColor"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor"/></svg>
        <span>Privacy</span>
      </a>
    </div>

  </div>
</div>
