<!-- signin-verify.component.html -->

<div class="gf-background-map-fixed gf-center-axes d-flex">
  <div class="gf-card gf-flow-vertical gf-container-sm gf-gap-24 gf-w-90">

    <!-- Logo -->
    <div class="gf-flow-vertical gf-center-axes">
      <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96"
           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/>
        <path d="M14 13.12c0 2.38 0 6.38-1 8.88"/>
        <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/>
        <path d="M2 12a10 10 0 0 1 18-6"/>
        <path d="M2 16h.01"/>
        <path d="M21.8 16c.2-2 .131-5.354 0-6"/>
        <path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2"/>
        <path d="M8.65 22c.21-.66.45-1.32.57-2"/>
        <path d="M9 6.8a6 6 0 0 1 9 5.2v2"/>
      </svg>
      <label class="header gf-text-lg">Two-Factor Authentication</label>
    </div>

    <div>
    <!-- Body -->
    <form id="verify-form" class="form gf-flow-vertical gf-gap-6" [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
      <div class="vertical-flow gf-gap-4">
        <p style="font-size: 0.875rem; color: var(--dark-text-muted); line-height: 1.4; margin: 0;">
          Enter the 6-digit verification code generated by your authenticator app to complete the sign-in process for your account.
        </p>
      </div>
      <div class="d-block">
        <input type="text" class="gf-w-100" formControlName="code" placeholder="Enter 6-digit code" maxlength="6" appNumbersOnly>
      </div>
    </form>

    <!-- Submit area -->
    <div class="gf-flow-vertical gf-my-8 gf-gap-4">
      <app-async-button
        type="submit"
        form="verify-form"
        labels="Verify"
        [state]="busyState.isBusy() ? 'busy' : verifySuccess ? 'success' : 'idle'"/>
      @if (getError(); as errorText) {
        <span class="gf-text-error">{{ getError() }}</span>
      }
      <p class="signin-invite">
        Return to <a [routerLink]="Path.SIGN_IN">sign in</a>.
      </p>
    </div>
    </div>

  </div>
</div>
