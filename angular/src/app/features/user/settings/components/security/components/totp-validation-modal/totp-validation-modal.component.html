<div class="modal-backdrop" (click)="$event.stopPropagation()">
  <div class="modal-container" role="dialog" aria-modal="true">
    <!-- Header -->
    <div class="modal-header">
      <h5>Two-Factor Verification</h5>
      <button (click)="onNegative()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>
    <!-- End header -->
    <div class="separator"></div>
    <!-- Body -->
    <div class="modal-body">
      <p>Enter the code generated by your authenticator app to confirm it's you</p>
      <form id="form" class="modal-form vertical-flow gf-gap-8" [formGroup]="form" (ngSubmit)="onPositive()">
        <div class="vertical-flow">
          <label>Two-Factor Code</label>
          <input type="text" id="code" formControlName="totp" placeholder="Enter 6-digit code" maxlength="6" appNumbersOnly>
        </div>
      </form>
    </div>
    <!-- End body -->
    <div class="separator"></div>
    <!-- Actions -->
    <div>
      @if (errorText) {
        <small class="error-text">{{ errorText }}</small>
      }
      <div class="modal-actions">
        <button class="btn-secondary" (click)="onNegative()">
          Cancel
        </button>
        <button class="btn-primary" type="submit" form="form">
          Confirm
        </button>
      </div>
    </div>
    <!-- End actions -->
  </div>
</div>
