<!-- change-lastname-modal.component.html -->

<div class="gf-modal-backdrop" (click)="$event.stopPropagation()">
  <div class="gf-flow-vertical gf-modal-shell gf-gap-16" (click)="$event.stopPropagation()">
    <div class="gf-flow-horizontal gf-justify-between gf-items-center">
      <h5>Change last name</h5>
      <button class="gf-modal-close-button" (click)="onNegative()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>

    <div class="gf-modal-separator-no-margin"></div>

    <div>
      <form id="form" class="gf-flow-vertical gf-modal-inputs-form" [formGroup]="form" (ngSubmit)="onPositive()">
        <div class="vertical-flow">
          <label>Last name</label>
          <input type="text" id="lastname" formControlName="lastName">
        </div>
      </form>
      @if (error(); as error) {
        <span class="gf-text-error">{{ error }}</span>
      }
    </div>

    <div class="gf-modal-separator-no-margin"></div>

    <div class="bottom-container gf-flow-horizontal gf-gap-10">
      <button
        class="gf-2btn-secondary-stroked"
        [disabled]="busyState.busy()"
        (click)="onNegative()">
        Cancel
      </button>
      <button
        class="gf-async-btn-primary-filled"
        gfAsyncBtn
        [labels]="{ idle: 'Change' }"
        [states]="{ busy: busyState.busy(), success: success() }"
        (click)="onPositive()">
      </button>
    </div>
  </div>
</div>
