<app-flat-header></app-flat-header>

<div class="stat-container">

  <div class="container">



    <div class="d-flex flex-column quick-access-wrapper">

      <!-- Quick View - Average Number of Published Pins -->
      <div class="d-flex justify-content-between align-content-center gf-card-stat-quick-view">

        <div class="d-flex flex-column justify-content-center quick-access-top-bottom-wrapper">

          <!-- * top -->
          <div class="d-flex align-items-center quick-access-top">

            <div class="d-flex align-items-center quick-access-icon average-published-pins">

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-chart-column-icon lucide-chart-column">
                <path d="M3 3v16a2 2 0 0 0 2 2h16" />
                <path d="M18 17V9" />
                <path d="M13 17V5" />
                <path d="M8 17v-3" />
              </svg>

            </div>

            <span class="text-medium quick-access-name">
              Average Number of Published Pins
            </span>

          </div>

          <!-- * bottom -->
          <div class="d-flex flex-column quick-access-preview">
            <span class="preview-text text-medium">
              Published In the last week: 12
            </span>

            <span class="preview-text text-medium">
              Published In the last month: 105
            </span>
          </div>

        </div>

        <!-- * Go To Post -->

        <div class="d-flex align-items-center">
          <button class="d-flex justify-content-center align-items-center quick-access-goto-button">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1,5"
              stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-square-arrow-right-enter-icon lucide-square-arrow-right-enter">
              <path d="m10 16 4-4-4-4" />
              <path d="M3 12h11" />
              <path d="M3 8V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3" />
            </svg>

          </button>

        </div>

      </div>

      <!-- Quick View - Pin Density by Location -->
      <div class="d-flex justify-content-between align-content-center gf-card-stat-quick-view">

        <div class="d-flex quick-access-top-bottom-wrapper">

          <!-- * top -->
          <div class="d-flex align-items-center quick-access-top">

            <div class="d-flex align-items-center quick-access-icon pin-density">

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
                stroke-width="1,5" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-map-pinned-icon lucide-map-pinned">
                <path
                  d="M18 8c0 3.613-3.869 7.429-5.393 8.795a1 1 0 0 1-1.214 0C9.87 15.429 6 11.613 6 8a6 6 0 0 1 12 0" />
                <circle cx="12" cy="8" r="2" />
                <path
                  d="M8.714 14h-3.71a1 1 0 0 0-.948.683l-2.004 6A1 1 0 0 0 3 22h18a1 1 0 0 0 .948-1.316l-2-6a1 1 0 0 0-.949-.684h-3.712" />
              </svg>

            </div>

            <span class="text-medium quick-access-name">
              Pin Density by Location
            </span>

          </div>

        </div>

        <!-- * Go To Post -->

        <div class="d-flex align-items-center">
          <button class="d-flex justify-content-center align-items-center quick-access-goto-button">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1,5"
              stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-square-arrow-right-enter-icon lucide-square-arrow-right-enter">
              <path d="m10 16 4-4-4-4" />
              <path d="M3 12h11" />
              <path d="M3 8V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3" />
            </svg>

          </button>

        </div>

      </div>

      <!-- Quick View - Pin Density by Location -->
      <div class="d-flex justify-content-between align-content-center gf-card-stat-quick-view">

        <div class="d-flex flex-column quick-access-top-bottom-wrapper">

          <!-- * top -->
          <div class="d-flex align-items-center quick-access-top">

            <div class="d-flex align-items-center quick-access-icon reports">

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-message-circle-warning-icon lucide-message-circle-warning">
                <path
                  d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719" />
                <path d="M12 8v4" />
                <path d="M12 16h.01" />
              </svg>

            </div>

            <span class="text-medium quick-access-name">
              Pin Density by Location
            </span>

          </div>

          <!-- * bottom -->
          <div class="d-flex flex-column quick-access-preview">
            <span class="preview-text text-medium">
              Reports awaiting review: 6
            </span>
          </div>

        </div>

        <!-- * Go To Post -->

        <div class="d-flex align-items-center">
          <button class="d-flex justify-content-center align-items-center quick-access-goto-button">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1,5"
              stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-square-arrow-right-enter-icon lucide-square-arrow-right-enter">
              <path d="m10 16 4-4-4-4" />
              <path d="M3 12h11" />
              <path d="M3 8V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3" />
            </svg>

          </button>

        </div>

      </div>


    </div>

  </div>
</div>



<app-footer></app-footer>
