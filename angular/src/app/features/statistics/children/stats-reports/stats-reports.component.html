<div class="container stats-section-wrapper">

  <!-- #region Quick View -->
  <div class="d-flex align-items-center quick-header-wrapper">

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"
      class="lucide lucide-message-circle-warning-icon lucide-message-circle-warning">
      <path
        d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719" />
      <path d="M12 8v4" />
      <path d="M12 16h.01" />
    </svg>

    <span class="text-bold">Reports</span>
  </div>
  <!-- #endregion -->

  <div class="quick-view-grid">

    @for (pin of reportedPins(); track pin.id) {
    <app-gf-card-pin-preview [pinData]="pin" [isReportedPin]="true" [reportNumber]="pin.id" [reportIndex]="pin.id"></app-gf-card-pin-preview>
  } @empty {
    <p>No reports available.</p>
  }

  @if (hasMoreResults()) {
    <button (click)="loadMore()" class="btn-show-more">Load More</button>
  }
  </div>

</div>
