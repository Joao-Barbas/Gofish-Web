<header class="w-100 dark-bg-dark">
  <div class="container-lg">

    <div class="row pt-4 pb-4 gap-3">

      <!-- # Logo and Gofish -->

      <div class="col-2 d-flex align-items-center gap-3">
        <div class="icon icon-gofish icon-size-about-table"></div>
        <span class="dark-text gofish-logo-text text-gofish font-heading">GOFISH</span>
      </div>

      <!-- # Header Items -->
      <div class="col-5 d-flex align-items-center gap-4
      header-item-font font-main header-items">

        <a routerLink="/"
          routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
          class="text-slim dark-text-muted">
          HOME
        </a>
        <a routerLink="/map" routerLinkActive="active"
        class="text-slim dark-text-muted">
          MAP
        </a>
        <a href="" routerLink="/forum" routerLinkActive="active"
        class="text-slim dark-text-muted">
          FORUM
        </a>
        <a routerLink="/about-us" routerLinkActive="active"
        class="text-slim dark-text-muted">
          ABOUT US
        </a>

      </div>
    </div>

  </div>
</header>
