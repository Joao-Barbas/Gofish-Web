<header class="w-100 dark-bg-dark">
  <div class="container-lg">

    <div class="row pt-4 pb-4 align-items-center">

      <!-- # Logo and Gofish -->

      <div class="col-2 d-flex align-items-center gap-2">
        <div class="icon-gofish icon-size-about-table"></div>
        <span class="dark-text text-gofish logo-text">GOFISH</span>
      </div>

      <!-- # Header Items -->
      <div class="col d-flex align-items-center gap-4 font-main header-items">

        <a routerLink="/"
          routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
          class="text-slim dark-text-muted">
          HOME
        </a>

        <a routerLink="/map" routerLinkActive="active"
        class="text-slim dark-text-muted">
          MAP
        </a>
        <a href="" routerLink="/forum" routerLinkActive="active"
        class="text-slim dark-text-muted">
          FORUM
        </a>
        <a routerLink="/about-us" routerLinkActive="active"
        class="text-slim dark-text-muted">
          ABOUT US
        </a>

      </div>

      <div class="col-auto d-flex align-items-center justify-content-end header-right icon-white-muted">
        <a href="/" class="gofish-btn-circle ">
          <div class="icon icon-search icon-size-header"></div>
        </a>
        <a href="/" class="gofish-btn-circle ">
          <div class="icon icon-user icon-size-header"></div>
        </a>
        <a href="/" class="gofish-btn-circle gofish-card-size">
          <div class="icon icon-shielduser icon-size-header"></div>
        </a>
      </div>

    </div>

    <!-- TODO:
      * Fazer o header responsivo (burger menu em ecrãs pequenos)
      * Experimentar refazer o header com list-group para torna-lo responsivo (dúvido)
      * https://getbootstrap.com/docs/5.3/components/list-group/#active-items
      * https://stackblitz.com/run?file=index.html
    -->

  </div>
</header>
