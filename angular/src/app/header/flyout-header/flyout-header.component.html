<!-- flyout-header.component.html -->
<header class="flyout-header d-flex justify-content-between align-items-start w-100">
  <!-- Left: Navbar pill -->
  <nav class="navbar-pill d-flex align-items-center gap-3 font-main">
    <a routerLink="/" class="navbar-logo">
      <div class="icon-gofish icon-size-flyout-logo"></div>
    </a>
    <div class="nav-divider"></div>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
       class="nav-link text-slim">HOME</a>
    <a routerLink="/map" routerLinkActive="active"
       class="nav-link text-slim">MAP</a>
    <a routerLink="/forum" routerLinkActive="active"
       class="nav-link text-slim">FORUM</a>
    <a routerLink="/about-us" routerLinkActive="active"
       class="nav-link text-slim">ABOUT US</a>
  </nav>

  <!-- Right: Floating actions -->
  <app-header-actions variant="flyout"></app-header-actions>
</header>
