@if (isOpen$ | async) {
  <div class="position-absolute header-dropdown">
    <div class="dropdown-header">
      <span class="dark-text text-medium">Admin</span>
    </div>
    <nav class="dropdown-nav">
      <a routerLink="/admin/users" class="dropdown-item" (click)="close()">
        <div class="icon icon-user icon-size-dropdown"></div>
        <span>Manage Users</span>
      </a>
      <a routerLink="/admin/reports" class="dropdown-item" (click)="close()">
        <div class="icon icon-warn icon-size-dropdown"></div>
        <span>Reports</span>
      </a>
    </nav>
  </div>
}
