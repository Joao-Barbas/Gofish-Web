<!-- async-button-3.component.html -->

<span class="icon-slot">
  @if (busy() && !disabled()) {
    <svg class="spinner-icon" animate.enter="spinner-enter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/>
      <path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/>
      <path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/>
      <path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/>
    </svg>
  } @else if (success() && !disabled()) {
    <svg class="check-icon" animate.enter="check-enter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6 9 17l-5-5"/>
    </svg>
  }
</span>
<span class="label-slot">{{ label() }}</span>
