<div class="gf-card-user-satisfaction-index">

  <div class="top">
    <div class="top-text-wrapper">

      <p class="top-title text-bold">How satisfied are you with <span class="gf-text-logo">GOFISH</span> so far?</p>

      <p class="dark-text-muted top-subtitle">Takes less than a second</p>
    </div>

    <button>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>

  </div>

  <div class="body-bottom-wrapper">


    <div class="body">
      <div class="index-wrapper">

        <button class="index one" [class.selected]="selected === 1" (click)="selectIndex(1)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-frown-icon lucide-frown">
            <circle cx="12" cy="12" r="10" />
            <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
            <line x1="9" x2="9.01" y1="9" y2="9" />
            <line x1="15" x2="15.01" y1="9" y2="9" />
          </svg>
          <span>1</span>
        </button>

        <button class="index two" [class.selected]="selected === 2" (click)="selectIndex(2)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-annoyed-icon lucide-annoyed">
            <circle cx="12" cy="12" r="10" />
            <path d="M8 15h8" />
            <path d="M8 9h2" />
            <path d="M14 9h2" />
          </svg>
          <span>2</span>
        </button>

        <button class="index three" [class.selected]="selected === 3" (click)="selectIndex(3)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-meh-icon lucide-meh">
            <circle cx="12" cy="12" r="10" />
            <line x1="8" x2="16" y1="15" y2="15" />
            <line x1="9" x2="9.01" y1="9" y2="9" />
            <line x1="15" x2="15.01" y1="9" y2="9" />
          </svg>
          <span>3</span>
        </button>

        <button class="index four" [class.selected]="selected === 4" (click)="selectIndex(4)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-smile-icon lucide-smile">
            <circle cx="12" cy="12" r="10" />
            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
            <line x1="9" x2="9.01" y1="9" y2="9" />
            <line x1="15" x2="15.01" y1="9" y2="9" />
          </svg>
          <span>4</span>
        </button>

        <button class="index five" [class.selected]="selected === 5" (click)="selectIndex(5)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-laugh-icon lucide-laugh">
            <circle cx="12" cy="12" r="10" />
            <path d="M18 13a6 6 0 0 1-6 5 6 6 0 0 1-6-5h12Z" />
            <line x1="9" x2="9.01" y1="9" y2="9" />
            <line x1="15" x2="15.01" y1="9" y2="9" />
          </svg>
          <span>5</span>
        </button>
      </div>

      <span class="index-text">{{ labels[selected] }}</span>
    </div>

    <div class="bottom">
      <button class="usi-action-btn">Ignore</button>
      <button class="usi-action-btn usi-submit-btn" [disabled]="selected === 0">Submit</button>
    </div>
  </div>
</div>
